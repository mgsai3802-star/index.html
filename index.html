<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REN FREE KEY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0d0d; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .card-grad { background: #1a1a1a; border-left: 4px solid #ef4444; border-radius: 12px; margin-bottom: 12px; padding: 16px; }
    </style>
</head>
<body class="p-4">
    <header class="mb-6 flex items-center gap-3">
        <div class="w-12 h-12 bg-red-600 rounded-xl flex items-center justify-center font-bold text-white italic">R</div>
        <h1 class="text-xl font-black italic text-white uppercase">REN FREE KEY</h1>
    </header>

    <div id="container" class="space-y-3 text-white">
        </div>

    <script>
        // အခုလောလောဆယ် သုံးလို့ရနေတဲ့ key တွေကို ကုဒ်ထဲမှာပဲ တိုက်ရိုက်ထည့်လိုက်ပါပြီ
        const keys = [
            { type: "VLESS", name: "Premium SG 01", config: "vless://78f44d82-c51a-4d76-b63e-3298c5417830@sg1.proxyfly.site:443?encryption=none&security=tls&type=ws&host=sg1.proxyfly.site&path=%2F#Premium-SG-01" },
            { type: "VLESS", name: "Premium US 02", config: "vless://78f44d82-c51a-4d76-b63e-3298c5417830@us1.proxyfly.site:443?encryption=none&security=tls&type=ws&host=us1.proxyfly.site&path=%2F#Premium-US-02" },
            { type: "VMESS", name: "High Speed HK", config: "vmess://eyJhZGQiOiJoay5wcm94eWZseS5zaXRlIiwicHMiOiJIaWdoLVNwZWVkLUhLIiwidHlwZSI6Im5vbmUiLCJzZWN1cml0eSI6InRscyIsInRscyI6InRscyJ9" }
        ];

        const cont = document.getElementById('container');
        cont.innerHTML = keys.map(item => `
            <div class="card-grad flex justify-between items-center" onclick="copy('${item.config}')">
                <div>
                    <div class="text-[10px] font-bold text-red-500 mb-1">${item.type}</div>
                    <div class="text-sm font-bold text-gray-100">${item.name}</div>
                </div>
                <i class="fa-solid fa-copy text-gray-600 text-xs"></i>
            </div>
        `).join('');

        function copy(str) {
            const el = document.createElement('textarea');
            el.value = str;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Key Copied!");
        }
    </script>
</body>
</html>
