<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REN FREE KEY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0d0d; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-grad { background: linear-gradient(145deg, #1a1a1a, #121212); border-left: 4px solid #ef4444; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-fast { animation: spin 0.6s linear infinite; }
    </style>
</head>
<body class="p-4 pb-24">
    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-2xl bg-red-600 flex items-center justify-center shadow-lg shadow-red-900/40 text-white font-black text-xl italic">R</div>
            <div>
                <h1 class="text-xl font-black italic tracking-tighter text-white">REN FREE <span class="text-red-600">KEY</span></h1>
                <p class="text-[9px] uppercase tracking-widest text-gray-500 font-bold">Premium Digital Access</p>
            </div>
        </div>
        <button id="refreshBtn" class="w-12 h-12 rounded-2xl glass flex items-center justify-center text-red-500 active:scale-90">
            <i class="fa-solid fa-arrows-rotate text-lg" id="refreshIcon"></i>
        </button>
    </header>

    <div class="mb-5">
        <input type="text" id="search" placeholder="Search by Location..." 
               class="w-full px-5 py-4 rounded-2xl glass border-none focus:ring-2 focus:ring-red-600 outline-none text-sm">
    </div>

    <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
        <div class="w-10 h-10 border-4 border-red-600/20 border-t-red-600 rounded-full animate-spin-fast mb-4"></div>
        <p class="text-[10px] font-bold text-gray-500 tracking-[0.2em]">FETCHING NODES...</p>
    </div>

    <div id="container" class="space-y-3"></div>

    <nav class="fixed bottom-4 left-4 right-4 h-16 glass rounded-2xl flex justify-around items-center border border-white/5">
        <button onclick="filterType('vless')" class="flex flex-col items-center gap-1"><i class="fa-solid fa-bolt text-gray-500"></i><span class="text-[8px] font-bold text-gray-500">VLESS</span></button>
        <button onclick="filterType('vmess')" class="flex flex-col items-center gap-1"><i class="fa-solid fa-shield-halved text-gray-500"></i><span class="text-[8px] font-bold text-gray-500">VMESS</span></button>
        <button onclick="filterType('ss')" class="flex flex-col items-center gap-1"><i class="fa-solid fa-shuttle-space text-gray-500"></i><span class="text-[8px] font-bold text-gray-500">OUTLINE</span></button>
    </nav>

    <script>
        const _0x1a2b = [
            "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3Byb3h5Zmx5L2ZyZWV2cG4vbWFpbi92bGVzcy50eHQ=",
            "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3Byb3h5Zmx5L2ZyZWV2cG4vbWFpbi92bWVzcy50eHQ=",
            "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3Byb3h5Zmx5L2ZyZWV2cG4vbWFpbi9zcy50eHQ="
        ];

        let _store = [];

        async function fetchData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            const load = document.getElementById('loading');
            const cont = document.getElementById('container');
            btn.disabled = true;
            icon.classList.add('animate-spin-fast');
            load.classList.remove('hidden');
            cont.innerHTML = '';
            _store = [];

            try {
                const proxy = "https://api.allorigins.win/raw?url=";
                for (let s of _0x1a2b) {
                    const resp = await fetch(proxy + encodeURIComponent(atob(s)));
                    const text = await resp.text();
                    text.split('\n').filter(l => l.trim().length > 10).forEach(line => {
                        let type = line.split('://')[0].toUpperCase();
                        let name = line.includes('#') ? decodeURIComponent(line.split('#')[1]).trim() : `Premium ${type} Server`;
                        // 404 စာသားပါနေရင် ဖယ်ထုတ်ပစ်မယ်
                        name = name.replace(/404: NOT FOUND/gi, '').trim() || `Premium ${type} Node`;
                        _store.push({ type, config: line.trim(), name });
                    });
                }
                render(_store);
            } catch (e) { alert("Network Error"); }
            finally {
                btn.disabled = false;
                icon.classList.remove('animate-spin-fast');
                load.classList.add('hidden');
            }
        }

        function render(data) {
            document.getElementById('container').innerHTML = data.map(item => `
                <div class="card-grad p-4 rounded-xl flex justify-between items-center active:scale-95 transition-all" onclick="copy('${item.config}')">
                    <div class="overflow-hidden">
                        <div class="text-[9px] font-black text-red-500 mb-0.5">${item.type}</div>
                        <div class="text-sm font-bold truncate text-gray-200">${item.name}</div>
                    </div>
                    <i class="fa-solid fa-copy text-gray-600 ml-4"></i>
                </div>
            `).join('');
        }

        function copy(s) {
            navigator.clipboard.writeText(s);
            const t = document.createElement('div');
            t.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-2 rounded-full text-[10px] font-bold z-[100]";
            t.innerText = "COPIED!";
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 1500);
        }

        function filterType(t) { render(_store.filter(i => i.type.toLowerCase().includes(t.toLowerCase()))); }

        document.getElementById('search').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            render(_store.filter(i => i.name.toLowerCase().includes(v) || i.type.toLowerCase().includes(v)));
        };

        window.onload = fetchData;
        document.getElementById('refreshBtn').onclick = fetchData;
    </script>
</body>
</html>
