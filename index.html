<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REN FREE KEY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(25, 25, 25, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-grad { background: linear-gradient(145deg, #1a1a1a, #121212); border-left: 4px solid #dc2626; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-fast { animation: spin 0.8s linear infinite; }
    </style>
</head>
<body class="p-4 pb-20">
    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-red-600">REN FREE KEY</h1>
            <p class="text-[10px] uppercase tracking-[0.2em] text-gray-500 font-bold">Secure VPN Aggregator</p>
        </div>
        <button id="refreshBtn" class="w-12 h-12 rounded-2xl glass flex items-center justify-center text-red-500 active:scale-90 transition-transform shadow-lg shadow-red-900/20">
            <i class="fa-solid fa-rotate-right text-xl" id="refreshIcon"></i>
        </button>
    </header>

    <div class="mb-6 sticky top-4 z-10">
        <input type="text" id="search" placeholder="Quick Filter (SG, US, JP)..." 
               class="w-full p-4 rounded-2xl glass border-none focus:ring-2 focus:ring-red-600 outline-none placeholder:text-gray-600 font-medium">
    </div>

    <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
        <div class="w-10 h-10 border-4 border-red-600/20 border-t-red-600 rounded-full animate-spin-fast mb-4"></div>
        <p class="text-sm font-bold text-gray-500 animate-pulse">BYPASSING SECURITY...</p>
    </div>

    <div id="container" class="space-y-3"></div>

    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/5 px-6 py-3 flex justify-around items-center z-50">
        <button onclick="filterType('vless')" class="flex flex-col items-center gap-1 group">
            <span class="text-[10px] font-black text-gray-500 group-active:text-red-500">VLESS</span>
        </button>
        <button onclick="filterType('vmess')" class="flex flex-col items-center gap-1 group">
            <span class="text-[10px] font-black text-gray-500 group-active:text-red-500">VMESS</span>
        </button>
        <button onclick="filterType('ss')" class="flex flex-col items-center gap-1 group">
            <span class="text-[10px] font-black text-gray-500 group-active:text-red-500">OUTLINE</span>
        </button>
    </nav>

    <script>
        // Sources encoded to avoid direct crawling (Base64)
        const _0x1a2b = [
            "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3Byb3h5Zmx5L2ZyZWV2cG4vbWFpbi92bGVzcy50eHQ=",
            "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3Byb3h5Zmx5L2ZyZWV2cG4vbWFpbi92bWVzcy50eHQ=",
            "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3Byb3h5Zmx5L2ZyZWV2cG4vbWFpbi9zcy50eHQ="
        ];

        let _store = [];

        async function fetchData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            const load = document.getElementById('loading');
            const cont = document.getElementById('container');

            btn.disabled = true;
            icon.classList.add('animate-spin-fast');
            load.classList.remove('hidden');
            cont.innerHTML = '';
            _store = [];

            // Web-friendly Proxy to bypass GitHub CORS block
            const proxy = "https://api.allorigins.win/raw?url=";

            try {
                for (let s of _0x1a2b) {
                    try {
                        const url = atob(s);
                        const resp = await fetch(proxy + encodeURIComponent(url));
                        const text = await resp.text();
                        const lines = text.split('\n').filter(l => l.trim().length > 10);
                        
                        lines.forEach(line => {
                            let name = "Global-Node";
                            if (line.includes('#')) name = decodeURIComponent(line.split('#')[1]);
                            _store.push({ type: line.split('://')[0], config: line, name: name });
                        });
                    } catch (e) { console.error("Source skip"); }
                }
                render(_store);
            } catch (err) {
                alert("Connection Error. Please check your internet.");
            } finally {
                btn.disabled = false;
                icon.classList.remove('animate-spin-fast');
                load.classList.add('hidden');
            }
        }

        function render(data) {
            const cont = document.getElementById('container');
            cont.innerHTML = data.map((item, idx) => `
                <div class="card-grad p-4 rounded-xl flex justify-between items-center group active:scale-[0.98] transition-all" onclick="copy('${item.config}')">
                    <div class="overflow-hidden mr-4">
                        <div class="text-[10px] font-black text-red-500 uppercase mb-1">${item.type}</div>
                        <div class="text-sm font-bold truncate text-gray-200">${item.name}</div>
                    </div>
                    <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center group-active:bg-red-600 transition-colors">
                        <i class="fa-solid fa-copy text-xs text-gray-500 group-active:text-white"></i>
                    </div>
                </div>
            `).join('');
        }

        function copy(str) {
            navigator.clipboard.writeText(str);
            const toast = document.createElement('div');
            toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-2 rounded-full text-xs font-bold shadow-xl z-[60]";
            toast.innerText = "CONFIG COPIED!";
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        function filterType(t) {
            const filtered = _store.filter(item => item.type.toLowerCase().includes(t.toLowerCase()));
            render(filtered);
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = _store.filter(item => item.name.toLowerCase().includes(val) || item.type.toLowerCase().includes(val));
            render(filtered);
        });

        document.getElementById('refreshBtn').onclick = fetchData;
        
        // Auto load on start
        window.onload = fetchData;
    </script>
</body>
</html>
