<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REN FREE KEY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0d0d; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-grad { background: linear-gradient(145deg, #1a1a1a, #121212); border-left: 4px solid #ef4444; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-fast { animation: spin 0.6s linear infinite; }
    </style>
</head>
<body class="p-4 pb-24">
    <header class="flex justify-between items-center mb-6 px-2">
        <div class="flex items-center gap-3">
            <img src="https://ui-avatars.com/api/?name=DR&background=000&color=fff&bold=true" id="appLogo" class="w-12 h-12 rounded-xl object-cover shadow-lg border border-white/10">
            <div>
                <h1 class="text-xl font-black italic tracking-tighter text-white uppercase leading-none">REN FREE KEY</h1>
                <p class="text-[9px] uppercase tracking-widest text-blue-400 font-bold mt-1">Premium Digital Access</p>
            </div>
        </div>
        <button id="refreshBtn" class="w-11 h-11 rounded-xl glass flex items-center justify-center text-red-500 active:scale-90 transition-all">
            <i class="fa-solid fa-arrows-rotate text-lg" id="refreshIcon"></i>
        </button>
    </header>

    <div id="loading" class="hidden flex flex-col items-center justify-center py-24">
        <div class="w-10 h-10 border-4 border-red-600/20 border-t-red-600 rounded-full animate-spin-fast mb-4"></div>
        <p class="text-[10px] font-bold text-gray-600 tracking-[0.3em]">FETCHING NODES...</p>
    </div>

    <div id="container" class="space-y-3"></div>

    <nav class="fixed bottom-4 left-4 right-4 h-16 glass rounded-2xl flex justify-around items-center border border-white/5 z-50 shadow-2xl">
        <button onclick="filterType('vless')" class="flex flex-col items-center gap-1 group">
            <i class="fa-solid fa-bolt text-gray-500 group-active:text-red-500 text-sm"></i>
            <span class="text-[9px] font-black text-gray-500">VLESS</span>
        </button>
        <button onclick="filterType('vmess')" class="flex flex-col items-center gap-1 group">
            <i class="fa-solid fa-shield-halved text-gray-500 group-active:text-red-500 text-sm"></i>
            <span class="text-[9px] font-black text-gray-500">VMESS</span>
        </button>
        <button onclick="filterType('ss')" class="flex flex-col items-center gap-1 group">
            <i class="fa-solid fa-shuttle-space text-gray-500 group-active:text-red-500 text-sm"></i>
            <span class="text-[9px] font-black text-gray-500">OUTLINE</span>
        </button>
    </nav>

    <script>
        const _sources = [
            "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3Byb3h5Zmx5L2ZyZWV2cG4vbWFpbi92bGVzcy50eHQ=",
            "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3Byb3h5Zmx5L2ZyZWV2cG4vbWFpbi92bWVzcy50eHQ=",
            "aHR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29tL3Byb3h5Zmx5L2ZyZWV2cG4vbWFpbi9zcy50eHQ="
        ];

        let _store = [];

        async function fetchData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            const load = document.getElementById('loading');
            const cont = document.getElementById('container');
            btn.disabled = true;
            icon.classList.add('animate-spin-fast');
            load.classList.remove('hidden');
            cont.innerHTML = '';
            _store = [];
            const proxy = "https://api.allorigins.win/raw?url=";

            try {
                for (let s of _sources) {
                    const resp = await fetch(proxy + encodeURIComponent(atob(s)));
                    const text = await resp.text();
                    text.split('\n').forEach(line => {
                        const cleanLine = line.trim();
                        if (cleanLine.length < 20 || !cleanLine.includes('://')) return;
                        let type = cleanLine.split('://')[0].toUpperCase();
                        let name = cleanLine.includes('#') ? decodeURIComponent(cleanLine.split('#')[1]).replace(/404: NOT FOUND/gi, '').trim() : `Premium ${type} Node`;
                        if (!name) name = `Premium ${type} Server`;
                        _store.push({ type, config: cleanLine, name });
                    });
                }
                render(_store);
            } catch (e) { alert("Network unstable."); }
            finally {
                btn.disabled = false;
                icon.classList.remove('animate-spin-fast');
                load.classList.add('hidden');
            }
        }

        function render(data) {
            document.getElementById('container').innerHTML = data.map(item => `
                <div class="card-grad p-4 rounded-xl flex justify-between items-center active:scale-95 transition-all" onclick="copy('${item.config}')">
                    <div class="overflow-hidden mr-2">
                        <div class="text-[9px] font-black text-red-500 mb-0.5">${item.type}</div>
                        <div class="text-sm font-bold truncate text-gray-100">${item.name}</div>
                    </div>
                    <i class="fa-solid fa-copy text-gray-600 text-xs"></i>
                </div>
            `).join('');
        }

        function copy(str) {
            navigator.clipboard.writeText(str);
            const t = document.createElement('div');
            t.className = "fixed top-12 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-2 rounded-full text-[10px] font-bold z-[100]";
            t.innerText = "CONFIG COPIED!";
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 1500);
        }

        function filterType(t) { render(_store.filter(i => i.type.toLowerCase().includes(t.toLowerCase()))); }

        window.onload = fetchData;
        document.getElementById('refreshBtn').onclick = fetchData;
    </script>
</body>
</html>
