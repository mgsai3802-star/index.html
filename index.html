<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REN FREE KEY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0d0d; color: #e5e5e5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .card-grad { background: #1a1a1a; border-left: 4px solid #ef4444; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-fast { animation: spin 0.6s linear infinite; }
    </style>
</head>
<body class="p-4 pb-28">
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-xl bg-red-600 flex items-center justify-center font-black text-xl italic shadow-lg shadow-red-900/40">R</div>
            <div>
                <h1 class="text-xl font-black italic text-white uppercase leading-none">REN FREE KEY</h1>
                <p class="text-[9px] uppercase tracking-widest text-blue-400 font-bold mt-1">Premium Digital Access</p>
            </div>
        </div>
        <button id="refreshBtn" class="w-11 h-11 rounded-xl glass flex items-center justify-center text-red-500 active:bg-red-600 active:text-white transition-all">
            <i class="fa-solid fa-arrows-rotate text-lg" id="refreshIcon"></i>
        </button>
    </header>

    <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
        <div class="w-10 h-10 border-4 border-red-600/10 border-t-red-600 rounded-full animate-spin-fast mb-4"></div>
        <p class="text-[10px] font-bold text-gray-500 tracking-widest">LOADING SERVER NODES...</p>
    </div>

    <div id="container" class="space-y-3"></div>

    <nav class="fixed bottom-6 left-6 right-6 h-16 glass rounded-2xl flex justify-around items-center border border-white/10 z-50 shadow-2xl">
        <button onclick="filterType('vless')" class="flex flex-col items-center gap-1 group">
            <i class="fa-solid fa-bolt text-gray-500 group-active:text-red-500"></i>
            <span class="text-[9px] font-black text-gray-500 uppercase">VLESS</span>
        </button>
        <button onclick="filterType('vmess')" class="flex flex-col items-center gap-1 group">
            <i class="fa-solid fa-shield-halved text-gray-500 group-active:text-red-500"></i>
            <span class="text-[9px] font-black text-gray-500 uppercase">VMESS</span>
        </button>
        <button onclick="filterType('ss')" class="flex flex-col items-center gap-1 group">
            <i class="fa-solid fa-shuttle-space text-gray-500 group-active:text-red-500"></i>
            <span class="text-[9px] font-black text-gray-500 uppercase">OUTLINE</span>
        </button>
    </nav>

    <script>
        // GitHub ကနေ တိုက်ရိုက်ဆွဲဖို့အတွက် CORS Proxy တွေကို အလှည့်ကျ သုံးပေးထားပါတယ်
        const proxies = [
            "https://api.allorigins.win/raw?url=",
            "https://api.codetabs.com/v1/proxy?quest=",
            "https://thingproxy.freeboard.io/fetch/"
        ];

        const sources = [
            "https://raw.githubusercontent.com/proxyfly/freevpn/main/vless.txt",
            "https://raw.githubusercontent.com/proxyfly/freevpn/main/vmess.txt",
            "https://raw.githubusercontent.com/proxyfly/freevpn/main/ss.txt"
        ];

        let _store = [];

        async function fetchData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            const load = document.getElementById('loading');
            const cont = document.getElementById('container');

            btn.disabled = true;
            icon.classList.add('animate-spin-fast');
            load.classList.remove('hidden');
            cont.innerHTML = '';
            _store = [];

            // Proxy အသစ်တွေနဲ့ တစ်လှည့်စီ စမ်းကြည့်မှာပါ
            for (let url of sources) {
                let success = false;
                for (let proxy of proxies) {
                    if (success) break;
                    try {
                        const resp = await fetch(proxy + encodeURIComponent(url));
                        if (!resp.ok) continue;
                        const text = await resp.text();
                        
                        text.split('\n').forEach(line => {
                            const clean = line.trim();
                            if (clean.length < 25 || !clean.includes('://')) return;

                            let type = clean.split('://')[0].toUpperCase();
                            let name = clean.includes('#') ? decodeURIComponent(clean.split('#')[1]) : `Global ${type} Node`;
                            name = name.replace(/404: NOT FOUND/gi, '').trim() || `${type} Premium Server`;

                            _store.push({ type, config: clean, name });
                        });
                        success = true;
                    } catch (e) { console.log("Trying next proxy..."); }
                }
            }

            render(_store);
            btn.disabled = false;
            icon.classList.remove('animate-spin-fast');
            load.classList.add('hidden');
            
            if (_store.length === 0) {
                cont.innerHTML = '<div class="text-center py-10 text-gray-600 font-bold text-[10px] uppercase">Connection Error. Please try again later.</div>';
            }
        }

        function render(data) {
            document.getElementById('container').innerHTML = data.map(item => `
                <div class="card-grad p-4 rounded-xl flex justify-between items-center active:bg-white/5 transition-all" onclick="copy('${item.config}')">
                    <div class="overflow-hidden mr-2">
                        <div class="text-[9px] font-black text-red-600 mb-0.5">${item.type}</div>
                        <div class="text-[13px] font-bold truncate text-gray-200">${item.name}</div>
                    </div>
                    <i class="fa-solid fa-copy text-gray-600 text-[10px]"></i>
                </div>
            `).join('');
        }

        function copy(str) {
            const el = document.createElement('textarea');
            el.value = str;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const t = document.createElement('div');
            t.className = "fixed top-12 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-2 rounded-full text-[10px] font-black z-[100] shadow-xl";
            t.innerText = "COPIED!";
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 1200);
        }

        function filterType(t) { render(_store.filter(i => i.type.toLowerCase().includes(t.toLowerCase()))); }

        window.onload = fetchData;
        document.getElementById('refreshBtn').onclick = fetchData;
    </script>
</body>
</html>
